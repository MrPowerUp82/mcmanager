{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Minecraft Server Console</title>
        <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
        <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
        <link href="{% static 'css/toastify.min.css' %}" rel="stylesheet" />
        <link href="{% static 'css/font-awesome.min.css' %}" rel="stylesheet" />
    </head>
    <body class="bg-gray-100 p-6">
        <div class="container mx-auto">
            <a href="{% url 'home' %}">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    <i class="fa fa-arrow-left" aria-hidden="true"></i>
                </button>
            </a>
            <h1 class="text-3xl font-bold mb-4">
                Server: {{ server.name }}
                {% if server_running %}
                    (ON)
                {% else %}
                    (OFF)
                {% endif %}
            </h1>
            <div class="mb-4">
                <button onclick="startServer()"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    Start Server
                </button>
                <button onclick="stopServer()"
                        class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded ml-2">
                    Stop Server
                </button>
                <button onclick="forceStopServer()"
                        class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded ml-2">
                    Force Stop Server
                </button>
                <button onclick="viewLogs()"
                        class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded ml-2">
                    View Logs
                </button>
                <button onclick="viewLaunchOutput()"
                        class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded ml-2">
                    Ver saída de erro
                </button>
                <!-- <button onclick="get_stats()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Ver Estatísticas</button> -->
            </div>
            <form id="command-form"
                  method="post"
                  action="{% url 'send_command' id=server.id %}"
                  class="mb-4">
                {% csrf_token %}
                <input type="text"
                       name="command"
                       placeholder="Enter command"
                       required
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-2">Send</button>
            </form>
            <div id="result" class="mb-4"></div>
            <div id="logs"
                 class="bg-white p-4 border rounded shadow-md overflow-y-auto overflow-x-hidden"
                 style="white-space: pre-wrap;
                        max-height: 400px"></div>
            <div id="launch-output"
                 class="bg-white p-4 border rounded shadow-md overflow-y-auto overflow-x-hidden mt-2"
                 style="white-space: pre-wrap;
                        max-height: 400px"></div>
            <div id="stats" class="mt-4"></div>
            <div class="mt-6">
                <h2 class="text-xl font-bold mb-2">Backups</h2>
                <button onclick="startBackup()"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    Fazer backup
                </button>
                <div id="backup-progress" class="mt-2"></div>
                <ul id="backup-list" class="mt-2"></ul>
            </div>
        </div>
        <script type="text/javascript" src="{% static 'js/toastify-js.js' %}"></script>
        <script>
            const server_is_on = "{{server_running}}" == "True" ? true : false;
            if (server_is_on) {
                var stats_job = setInterval(get_stats, 2500);
                var log_job = setInterval(viewLogs, 2500);
            }
            const memory_limit = parseFloat("{{server.memory_limit}}");
            let logOffset = 0;
            let logFetchInFlight = false;

            const create_toast = (message, bgColor, textColor) => {
                Toastify({
                    text: message,
                    duration: 4000,
                    newWindow: true,
                    close: true,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    style: {
                        background: bgColor,
                        color: textColor,
                    },
                    // onClick: function () {},
                }).showToast();
            }

            function get_stats() {
                if (server_is_on) {
                    fetch("{% url 'get_server_stats' id=server.id %}")
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'success') {
                                document.getElementById('stats').innerHTML = `
                        <div>
                            <strong>Uso da CPU:</strong>
                            <div style="width: 400px; background-color: #e3e3e3; border-radius: 8px;">
                                <div style="text-align: center ;width: ${data.cpu_usage}%; background-color: aqua; border-radius: 8px; font-weight: bold;">
                                    ${data.cpu_usage}%
                                </div>
                            </div>
                        </div>
                        <div>
                            <strong>Uso da Memória Disponível:</strong>
                            <div style="width: 400px; background-color: #e3e3e3; border-radius: 8px;">
                                <div style="text-align: center ;width: ${(data.memory_usage/memory_limit*100).toFixed(1)}%; background-color: aqua; border-radius: 8px; font-weight: bold;">
                                    ${(data.memory_usage/memory_limit*100).toFixed(1)}%
                                </div>
                            </div>
                        </div>
                        <div>
                            <strong>Uso Total da Memória:</strong>
                            <div style="width: 400px; background-color: #e3e3e3; border-radius: 8px;">
                                <div style="text-align: center ;width: ${(data.used_memory/data.total_memory*100).toFixed(1)}%; background-color: aqua; border-radius: 8px; font-weight: bold;">
                                    ${(data.used_memory/data.total_memory*100).toFixed(1)}%
                                </div>
                            </div>
                        </div>
                        <div>
                            <strong>Uso Total da CPU:</strong>
                            <div style="width: 400px; background-color: #e3e3e3; border-radius: 8px;">
                                <div style="text-align: center ;width: ${data.total_cpu_usage}%; background-color: aqua; border-radius: 8px; font-weight: bold;">
                                    ${data.total_cpu_usage}%
                                </div>
                            </div>
                        </div>
                        <br />
                        <p><strong>Memória Disponível:</strong> ${memory_limit.toFixed(2)} MB</p>
                        <p><strong>Memória em Uso:</strong> ${data.memory_usage.toFixed(2)} MB</p>
                        <p><strong>Memória Total:</strong> ${data.total_memory.toFixed(2)} MB</p>
                        <p><strong>Memória Total em Uso:</strong> ${data.used_memory.toFixed(2)} MB</p>
                        `;
                            } else {
                                document.getElementById('stats').innerHTML = `<p>${data.message}</p>`;
                            }
                        });
                } else {
                    clearInterval(stats_job);
                    clearInterval(log_job);
                }
            }

            function getCsrfToken() {
                return document.querySelector('[name=csrfmiddlewaretoken]').value;
            }

            function postJSON(url) {
                return fetch(url, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCsrfToken() }
                }).then(response => response.json());
            }

            function startServer() {
                postJSON("{% url 'start_server' id=server.id %}")
                    .then(data => {
                        create_toast(data.message, 'green', 'white');
                        if (data.status === 'success') {
                            location.reload();
                        }
                    });
            }

            function stopServer() {
                postJSON("{% url 'stop_server' id=server.id %}")
                    .then(data => {
                        create_toast(data.message, 'red', 'white');
                        if (data.status === 'success') {
                            location.reload();
                        }
                    });
            }

            function forceStopServer() {
                postJSON("{% url 'force_stop_server' id=server.id %}")
                    .then(data => {
                        create_toast(data.message, 'red', 'white');
                        if (data.status === 'success') {
                            location.reload();
                        }
                    });
            }

            function viewLogs() {
                if (logFetchInFlight) {
                    return;
                }
                logFetchInFlight = true;
                fetch(`{% url 'view_logs' id=server.id %}?offset=${logOffset}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            const logsEl = document.getElementById('logs');
                            if (data.offset < logOffset) {
                                logsEl.textContent = '';
                            }
                            logsEl.textContent += data.logs;
                            logOffset = data.offset;
                            logsEl.scrollTop = logsEl.scrollHeight;
                        } else {
                            create_toast(data.message, 'red', 'white');
                        }
                    })
                    .finally(() => {
                        logFetchInFlight = false;
                    });
            }

            function viewLaunchOutput() {
                fetch("{% url 'launch_output' id=server.id %}")
                    .then(response => response.json())
                    .then(data => {
                        const panel = document.getElementById('launch-output');
                        if (data.status === 'success') {
                            panel.textContent = data.output;
                        } else {
                            panel.textContent = data.message;
                        }
                    });
            }

            document.getElementById('command-form').onsubmit = function(event) {
                event.preventDefault();
                var formData = new FormData(this);
                fetch("{% url 'send_command' id=server.id %}", {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        // alert(data.message);
                        create_toast(data.message, 'green', 'white');
                        document.getElementById('result').innerText = data.message;
                    }).catch(error => {
                        // alert('An error occurred');
                        create_toast('An error occurred', 'red', 'white');
                        document.getElementById('result').innerText = String(error);
                    }).finally(() => {
                        document.getElementById('command-form').reset();
                        viewLogs();
                    });
            };

            let backupPoll = null;

            function loadBackupList() {
                fetch(`/console/backups/{{ server.id }}`)
                    .then(response => response.json())
                    .then(data => {
                        const list = document.getElementById('backup-list');
                        list.innerHTML = '';
                        if (data.status !== 'success') {
                            create_toast(data.message, 'red', 'white');
                            return;
                        }
                        data.backups.forEach(filename => {
                            const item = document.createElement('li');
                            item.className = 'flex items-center gap-2 mb-1';
                            item.innerHTML = `
                                <span>${filename}</span>
                                <button class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-1 px-2 rounded text-sm">Restaurar</button>
                                <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-2 rounded text-sm">Apagar</button>
                            `;
                            const [restoreBtn, deleteBtn] = item.querySelectorAll('button');
                            restoreBtn.onclick = () => restoreBackup(filename);
                            restoreBtn.disabled = server_is_on;
                            deleteBtn.onclick = () => deleteBackupFile(filename);
                            list.appendChild(item);
                        });
                    });
            }

            loadBackupList();

            function startBackup() {
                postJSON(`/console/backups/{{ server.id }}/create`)
                    .then(data => {
                        if (data.status === 'success') {
                            pollBackupStatus(data.backup_id);
                        } else {
                            create_toast(data.message, 'red', 'white');
                        }
                    });
            }

            function pollBackupStatus(backupId) {
                if (backupPoll !== null) {
                    clearInterval(backupPoll);
                }
                document.getElementById('backup-progress').textContent = 'Fazendo backup...';
                backupPoll = setInterval(() => {
                    fetch(`/console/backups/status/${backupId}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.backup_status === 'done') {
                                clearInterval(backupPoll);
                                document.getElementById('backup-progress').textContent = '';
                                create_toast('Backup concluído: ' + data.filename, 'green', 'white');
                                loadBackupList();
                            } else if (data.backup_status === 'error') {
                                clearInterval(backupPoll);
                                document.getElementById('backup-progress').textContent = '';
                                create_toast(data.error_message, 'red', 'white');
                            }
                        });
                }, 2000);
            }

            function restoreBackup(filename) {
                if (!confirm(`Restaurar o backup ${filename}? Isso substitui todos os arquivos atuais do servidor.`)) {
                    return;
                }
                const formData = new FormData();
                formData.append('filename', filename);
                fetch(`/console/backups/{{ server.id }}/restore`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': getCsrfToken() },
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            create_toast('Backup restaurado', 'green', 'white');
                        } else {
                            create_toast(data.message, 'red', 'white');
                        }
                    });
            }

            function deleteBackupFile(filename) {
                if (!confirm(`Apagar o backup ${filename}? Essa ação não pode ser desfeita.`)) {
                    return;
                }
                const formData = new FormData();
                formData.append('filename', filename);
                fetch(`/console/backups/{{ server.id }}/delete`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': getCsrfToken() },
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            create_toast('Backup apagado', 'green', 'white');
                            loadBackupList();
                        } else {
                            create_toast(data.message, 'red', 'white');
                        }
                    });
            }
        </script>
    </body>
</html>
